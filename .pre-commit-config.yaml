exclude: >-
  (?x)^(
    dev/desktop/src-tauri/(target|resources)/|
    \.venv/|
    node_modules/|
    dist/|
    build/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: cargo-fmt
        name: rust:cargo:fmt
        entry: cargo fmt --manifest-path dev/desktop/src-tauri/Cargo.toml --
        language: system
        types: [rust]
        files: ^dev/desktop/src-tauri/src/


