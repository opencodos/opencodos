exclude: >-
  (?x)^(
    dev/desktop/src-tauri/(target|resources)/|
    \.venv/|
    node_modules/|
    dist/|
    build/
  )

repos:
  - repo: local
    hooks:
      - id: frontend-deps
        name: _deps:frontend
        entry: bash -c 'cd dev/frontend && bun install --frozen-lockfile --silent'
        language: system
        files: ^dev/frontend/
        pass_filenames: false

      - id: backend-deps
        name: _deps:backend
        entry: bash -c 'uv sync --project backend --extra dev --quiet && uv run --project backend python -c "import telethon; open(telethon.__path__[0]+\"/py.typed\",\"a\").close()"'
        language: system
        pass_filenames: false
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: cargo-fmt
        name: rust:cargo-fmt
        entry: cargo fmt --manifest-path dev/desktop/src-tauri/Cargo.toml --
        language: system
        types: [rust]
        files: ^dev/desktop/src-tauri/src/

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend:ESLint
        entry: bash -c 'cd dev/frontend && bun run lint'
        language: system
        files: ^dev/frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: frontend-tsc
        name: frontend:tsc
        entry: bash -c 'cd dev/frontend && bunx tsc -b'
        language: system
        files: ^dev/frontend/.*\.(ts|tsx)$
        pass_filenames: false

  - repo: local
    hooks:
      - id: import-linter
        name: backend:importlinter
        entry: bash -c 'uv run --project backend lint-imports --config backend/pyproject.toml'
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: backend:mypy
        entry: bash -c 'uv run --project backend mypy --config-file backend/pyproject.toml backend/'
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^tests/

      - id: pyright
        name: backend:pyright
        entry: bash -c 'uv run --project backend pyright backend/'
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^tests/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-format
        name: backend:ruff-format
        args: ["--config", "backend/pyproject.toml"]
      - id: ruff
        name: backend:ruff
        args: ["--fix", "--config", "backend/pyproject.toml"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: backend:shellcheck
        args: ["--severity=warning"]


  - repo: local
    hooks:
      - id: ingestion-tsc
        name: ingestion:tsc
        entry: bash -c 'bun install --cwd ingestion --frozen-lockfile --silent && cd ingestion && bunx tsc'
        language: system
        files: ^ingestion/.*\.ts$
        exclude: (node_modules|_archived)
        pass_filenames: false

      - id: skills-workflows-tsc
        name: skills:tsc
        entry: bash -c 'bun install --cwd ingestion --frozen-lockfile --silent && bun install --cwd "skills/Scheduled Workflows" --frozen-lockfile --silent && cd "skills/Scheduled Workflows" && bunx tsc'
        language: system
        files: ^(skills/Scheduled Workflows|ingestion/lib)/.*\.ts$
        exclude: (node_modules|_archived)
        pass_filenames: false

