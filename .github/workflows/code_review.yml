name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.user.login == 'arodiss' || github.event.pull_request.user.login == 'dhan2010')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            ${{ github.event_name == 'pull_request' && format('REPO: {0}
            PR NUMBER: {1}

            Review this PR with the following focus:

            1. **Overall Summary** - Describe what the PR does and highlight any high-level problems or architecture issues. Check ARCHITECTURE.md for invariants. If there are no high-level issues, explicitly say so.

            2. **Code Quality** - Flag potential bugs, security issues, performance problems, or code quality concerns on specific lines.

            Provide detailed feedback using inline comments for specific issues.
            Use a top-level comment for the overall summary.', github.repository, github.event.pull_request.number) || '' }}
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
